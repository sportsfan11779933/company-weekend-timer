<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Company Weekend 2026</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('achtergrond.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Voorkomt ongewenste scrollbalken */
        }
        
        .timer-container {
            /* Dit is de truc: we maken de breedte 90% van het scherm (vw = viewport width) */
            width: 100vw; 
            max-width: 1400px; /* Zorgt dat hij op hele grote monitoren niet onleesbaar uitrekt */
            background-color: rgba(255, 255, 255, 0.85);
            padding: 50px 20px; /* Extra ruimte boven en onder */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* We dwingen de timer zelf om de volle 100% van het witte blok te vullen */
        .countdown-timer {
            width: 120% !important;
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <script src="https://cdn.logwork.com/widget/countdown.js"></script>
        <a href="https://logwork.com/countdown-timer" class="countdown-timer" data-style="columns" data-timezone="Europe/Amsterdam" data-date="2026-06-12 10:00">Countdown Company Weekend 2026</a>
    </div>

</body>
</html>
