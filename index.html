<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Company Weekend 2026</title>
    <style>
        /* Zorgt ervoor dat de pagina het hele scherm vult */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Hier laden we jouw afbeelding in */
            background-image: url('achtergrond.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
        }
        
        /* Een licht doorzichtig kader om de timer beter leesbaar te maken */
        .timer-container {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <script src="https://cdn.logwork.com/widget/countdown.js"></script>
        <a href="https://logwork.com/countdown-timer" class="countdown-timer" data-style="columns" data-timezone="Europe/Amsterdam" data-date="2026-06-12 10:00">Countdown Company Weekend 2026</a>
    </div>

</body>
</html>
